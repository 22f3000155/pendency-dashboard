<!DOCTYPE html>
<html>

<head>

    <title>Pendency Dashboard</title>

    <link rel="stylesheet" href="./style.css?v=8">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <h1>Pendency Dashboard</h1>

    <div id="lastUpdated"></div>


    <!-- Summary Cards -->

    <div class="summaryCards">

        <div class="card">

            <h2 id="totalPending">0</h2>

            <p>Total Pending</p>

        </div>

        <div class="card redCard">

            <h2 id="above30">0</h2>

            <p>Exceeded SLA</p>

        </div>

        <div class="card greenCard">

            <h2 id="below30">0</h2>

            <p>Within SLA</p>

        </div>

        <div class="card blueCard">

            <h2 id="totalOffices">0</h2>

            <p>Total Offices</p>

        </div>

    </div>




    <!-- Filters -->

    <div class="filters">

        <input
            type="text"
            id="serviceFilter"
            placeholder="Search Service"
        >

        <input
            type="text"
            id="officeFilter"
            placeholder="Search Office"
        >

        <input
            type="text"
            id="pendingFilter"
            placeholder="Search Pending At"
        >


        <select id="daysFilter">

            <option value="">
                All Applications
            </option>

            <option value="above30">
                Exceeded SLA
            </option>

            <option value="below30">
                Within SLA
            </option>

        </select>

    </div>





    <!-- Download Button -->

    <button id="downloadBtn">

        Download Filtered Report

    </button>





    <!-- Charts -->

    <div class="charts">

        <div class="chartBox">

            <canvas id="officeChart"></canvas>

        </div>

        <div class="chartBox">

            <canvas id="serviceChart"></canvas>

        </div>

    </div>





    <!-- Table -->

    <table id="reportTable">

        <thead>

            <tr>

                <th>Service</th>

                <th>Applicant</th>

                <th>ACK</th>

                <th>Pending At</th>

                <th>Role</th>

                <th>Office</th>

                <th>Submission Date</th>

                <th>Pending Days</th>

                <th>Limit</th>

                <th>Exceeded By</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>



    <script src="./script.js?v=8"></script>

</body>

</html>
