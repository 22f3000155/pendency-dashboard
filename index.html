<!DOCTYPE html>
<html>

<head>

    <title>Pendency Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Pendency Dashboard</h1>


    <!-- Filters -->
    <div class="filters">

        <!-- Service Search -->
        <input
            type="text"
            id="serviceFilter"
            placeholder="Search Service"
        >

        <!-- Office Search -->
        <input
            type="text"
            id="officeFilter"
            placeholder="Search Office"
        >

        <!-- Pending At Search -->
        <input
            type="text"
            id="pendingFilter"
            placeholder="Search Pending At"
        >

        <!-- Days Filter -->
        <select id="daysFilter">

            <option value="">All Days</option>

            <option value="above30">
                Above 30 Days
            </option>

            <option value="below30">
                Below 30 Days
            </option>

        </select>

    </div>



    <!-- Table -->
    <table id="reportTable">

        <thead>

            <tr>

                <th>Service</th>

                <th>Applicant</th>

                <th>ACK</th>

                <th>Pending At</th>

                <th>Role</th>

                <th>Office</th>

                <th>Submission Date</th>

                <th>Pending Days</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>



    <script src="script.js"></script>

</body>

</html>
